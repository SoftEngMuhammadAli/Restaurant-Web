services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: ./server
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      MONGO_URI: mongodb://mongo:27017/restaurant_app
      CLIENT_URL: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      - mongo

  client:
    build:
      context: ./client
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000/api
      VITE_SOCKET_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  mongo-data:
